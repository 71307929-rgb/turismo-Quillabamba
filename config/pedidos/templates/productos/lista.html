{% extends 'base.html' %}

{% block content %}

<h2 class="text-center text-primary mb-4">
    🛍️ Nuestros Productos
</h2>

<!-- BUSCADOR -->
<form method="GET" class="mb-4">

    <div class="row">

        <div class="col-md-8">
            <input
                type="text"
                name="buscar"
                class="form-control"
                placeholder="Buscar producto..."
                value="{{ buscar }}">
        </div>

        <div class="col-md-2">
            <button class="btn btn-primary w-100">
                Buscar
            </button>
        </div>

        <div class="col-md-2">
            <a href="{% url 'lista_productos' %}"
                class="btn btn-secondary w-100">
                Limpiar
            </a>
        </div>

    </div>

</form>

<div class="row">

    {% for p in productos %}
    <div class="col-md-4 mb-4">

        <div class="card shadow h-100">

            <div class="card-body text-center">

                <h4>{{ p.nombre }}</h4>

                <p class="text-success fw-bold">
                    S/ {{ p.precio }}
                </p>

                <p>
                    Stock: {{ p.stock }}
                </p>

                <a href="{% url 'agregar' p.id %}"
                class="btn btn-success">
                    ➕ Agregar al carrito
                </a>

            </div>

        </div>

    </div>
    {% endfor %}

</div>

{% endblock %}
